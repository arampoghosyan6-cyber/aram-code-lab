<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Ubuntu', sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; background-color: #ffffff; margin: 0 auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        h1 { color: #333333; font-size: 24px; }
        p { color: #555555; font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
        .btn { display: inline-block; background-color: #fc5c65; color: #ffffff; text-decoration: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; font-size: 16px; }
        .btn:hover { background-color: #e84118; }
        .footer { margin-top: 30px; font-size: 12px; color: #aaaaaa; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Aram Code Lab</h2>
        <h1>{{ title }}</h1>
        <p>{{ greeting }}<br><br>{{ message_text }}</p>
        <a href="{{ verify_link }}" class="btn">{{ button_text }}</a>
        <div class="footer">
            <p>If you didn't request this, you can safely ignore this email.</p>
            <p>© 2026 Aram Code Lab.</p>
        </div>
    </div>
</body>
</html>
