{% extends 'base.html' %} {% load i18n %}

{% block title %}{% trans "Verification" %} - Aram Code Lab{% endblock %}

{% block content %}
<section class="dark" style="padding: 150px 0; min-height: 60vh; display: flex; align-items: center; justify-content: center;">
    <div class="inner-width" style="text-align: center; background: #2f3640; padding: 50px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">

        {% if is_success %}
            <i class="fas fa-check-circle" style="font-size: 80px; color: #2ed573; margin-bottom: 20px;"></i>
        {% else %}
            <i class="fas fa-times-circle" style="font-size: 80px; color: #ff4757; margin-bottom: 20px;"></i>
        {% endif %}

        <h1 style="color: #f1f1f1; margin-bottom: 15px;">{{ status_title }}</h1>
        <p style="color: #dcdde1; font-size: 18px; margin-bottom: 30px;">{{ status_message }}</p>

        <a href="{% url 'home' %}" class="btn" style="padding: 12px 25px;">{% trans "Return to Home" %}</a>
    </div>
</section>
{% endblock %}
